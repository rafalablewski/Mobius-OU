<svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Portugal">
  <!-- Shield silhouette -->
  <path d="M4 6 H76 V52 C76 72 40 92 40 92 C40 92 4 72 4 52 Z"
        fill="#FFFFFF" stroke="#0B0F14" stroke-width="1.5"/>
  <!-- Red inner border band -->
  <path d="M8 10 H72 V52 C72 70 40 88 40 88 C40 88 8 70 8 52 Z"
        fill="none" stroke="#7A1E26" stroke-width="4"/>
  <!-- 7 champagne castles on the red band -->
  <g fill="#C9A86A">
    <rect x="12" y="14" width="4" height="4"/>
    <rect x="36" y="12" width="4" height="4"/>
    <rect x="60" y="14" width="4" height="4"/>
    <rect x="8" y="36" width="4" height="4"/>
    <rect x="64" y="36" width="4" height="4"/>
    <rect x="18" y="62" width="4" height="4"/>
    <rect x="54" y="62" width="4" height="4"/>
  </g>
  <!-- Five quinas (small shields) in cross pattern, ink -->
  <g fill="#0B0F14">
    <rect x="37" y="30" width="6" height="8" rx="0.8"/>
    <rect x="26" y="40" width="6" height="8" rx="0.8"/>
    <rect x="48" y="40" width="6" height="8" rx="0.8"/>
    <rect x="37" y="50" width="6" height="8" rx="0.8"/>
    <rect x="37" y="60" width="6" height="8" rx="0.8"/>
  </g>
</svg>
