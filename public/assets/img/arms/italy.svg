<svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Italy">
  <!-- Shield silhouette in ivory -->
  <path d="M4 6 H76 V52 C76 72 40 92 40 92 C40 92 4 72 4 52 Z"
        fill="#F4EFE6" stroke="#0B0F14" stroke-width="1.5"/>
  <!-- Laurel wreath (left + right) in forest green -->
  <g fill="#1F4D3A">
    <path d="M14 36 C12 46 16 58 24 64 C18 56 14 46 14 36 Z"/>
    <path d="M66 36 C68 46 64 58 56 64 C62 56 66 46 66 36 Z"/>
    <circle cx="18" cy="40" r="2"/>
    <circle cx="16" cy="50" r="2"/>
    <circle cx="20" cy="58" r="2"/>
    <circle cx="62" cy="40" r="2"/>
    <circle cx="64" cy="50" r="2"/>
    <circle cx="60" cy="58" r="2"/>
  </g>
  <!-- Central gear (Italy Republic emblem) in champagne -->
  <circle cx="40" cy="50" r="10" fill="none" stroke="#C9A86A" stroke-width="1.5"/>
  <!-- 5-point star in oxblood -->
  <polygon points="40,36 42.5,44 51,44 44,49 46.5,57 40,52 33.5,57 36,49 29,44 37.5,44"
           fill="#7A1E26"/>
</svg>
