<svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Malta">
  <!-- Shield silhouette, split white (left) and red (right) -->
  <path d="M4 6 H40 V92 C40 92 4 72 4 52 Z"
        fill="#FFFFFF" stroke="#0B0F14" stroke-width="1.5"/>
  <path d="M40 6 H76 V52 C76 72 40 92 40 92 Z"
        fill="#7A1E26" stroke="#0B0F14" stroke-width="1.5"/>
  <!-- George Cross in top-left (champagne-outlined white panel) -->
  <rect x="12" y="14" width="20" height="20" fill="#FFFFFF" stroke="#C9A86A" stroke-width="1.2"/>
  <!-- Simplified cross inside the George Cross panel -->
  <g fill="#0B0F14">
    <rect x="20" y="18" width="4" height="12"/>
    <rect x="16" y="22" width="12" height="4"/>
  </g>
  <!-- Crown above in champagne -->
  <g fill="#C9A86A">
    <rect x="30" y="2" width="20" height="3"/>
    <polygon points="30,2 34,-2 38,2"/>
    <polygon points="38,2 42,-2 46,2"/>
    <polygon points="46,2 50,-2 54,2"/>
  </g>
</svg>
