<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Atlas" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="ap-glow" cx="60%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#c9a96e" stop-opacity="0.22"/>
      <stop offset="55%"  stop-color="#0a1a2f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ap-vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#0a1a2f" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a1a2f" stop-opacity="0.65"/>
    </radialGradient>
    <linearGradient id="ap-arc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#c9a96e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c9a96e" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </linearGradient>
    <style>
      .meridian, .parallel { fill: none; stroke: #f4ede0; stroke-opacity: 0.10; stroke-width: 1; }
      .graticule           { fill: none; stroke: #f4ede0; stroke-opacity: 0.06; stroke-width: 1; stroke-dasharray: 2 6; }
      .arc                 { fill: none; stroke: url(#ap-arc); stroke-width: 1.25; stroke-linecap: round; }
      .arc--bright         { stroke: #c9a96e; stroke-opacity: 0.7; stroke-width: 1.1; }
      .dest                { fill: #c9a96e; }
      .dest-ring           { fill: none; stroke: #c9a96e; stroke-opacity: 0.45; }
      .dot                 { fill: #f4ede0; fill-opacity: 0.18; }
    </style>
  </defs>

  <!-- Backdrop -->
  <rect width="1600" height="1000" fill="#0a1a2f"/>
  <rect width="1600" height="1000" fill="url(#ap-glow)"/>

  <!-- Stylised globe on the right -->
  <g transform="translate(1080,500)">
    <circle r="440" class="parallel"/>
    <circle r="360" class="parallel"/>
    <circle r="280" class="parallel"/>
    <circle r="200" class="parallel"/>
    <circle r="120" class="parallel"/>

    <!-- Meridians rendered as ellipses to simulate a sphere -->
    <ellipse rx="440" ry="440" class="meridian"/>
    <ellipse rx="340" ry="440" class="meridian"/>
    <ellipse rx="220" ry="440" class="meridian"/>
    <ellipse rx="80"  ry="440" class="meridian"/>
    <ellipse rx="440" ry="340" class="meridian"/>
    <ellipse rx="440" ry="220" class="meridian"/>
    <ellipse rx="440" ry="80"  class="meridian"/>

    <!-- Dotted “continent” suggestion around the globe -->
    <g class="dot">
      <circle cx="-120" cy="-160" r="3"/><circle cx="-90" cy="-170" r="3"/><circle cx="-60" cy="-160" r="3"/>
      <circle cx="-30" cy="-140" r="3"/><circle cx="0" cy="-150" r="3"/><circle cx="40" cy="-130" r="3"/>
      <circle cx="70" cy="-110" r="3"/><circle cx="110" cy="-120" r="3"/><circle cx="150" cy="-90" r="3"/>
      <circle cx="-150" cy="-60" r="3"/><circle cx="-110" cy="-40" r="3"/><circle cx="-80" cy="-20" r="3"/>
      <circle cx="-40" cy="-10" r="3"/><circle cx="0" cy="10" r="3"/><circle cx="40" cy="20" r="3"/>
      <circle cx="80" cy="30" r="3"/><circle cx="130" cy="40" r="3"/><circle cx="180" cy="20" r="3"/>
      <circle cx="-200" cy="60" r="3"/><circle cx="-160" cy="90" r="3"/><circle cx="-120" cy="110" r="3"/>
      <circle cx="-70" cy="130" r="3"/><circle cx="-20" cy="140" r="3"/><circle cx="30" cy="150" r="3"/>
      <circle cx="90" cy="150" r="3"/><circle cx="150" cy="140" r="3"/><circle cx="200" cy="120" r="3"/>
      <circle cx="240" cy="90" r="3"/><circle cx="-220" cy="180" r="3"/><circle cx="-180" cy="210" r="3"/>
      <circle cx="-140" cy="230" r="3"/><circle cx="-80" cy="240" r="3"/><circle cx="-20" cy="250" r="3"/>
      <circle cx="40" cy="250" r="3"/><circle cx="100" cy="240" r="3"/><circle cx="160" cy="220" r="3"/>
      <circle cx="210" cy="190" r="3"/><circle cx="-60" cy="-260" r="3"/><circle cx="-20" cy="-280" r="3"/>
      <circle cx="30" cy="-270" r="3"/><circle cx="80" cy="-250" r="3"/><circle cx="130" cy="-230" r="3"/>
    </g>
  </g>

  <!-- Lat/long graticule across whole frame -->
  <g class="graticule">
    <path d="M0 200 H1600"/><path d="M0 400 H1600"/><path d="M0 600 H1600"/><path d="M0 800 H1600"/>
    <path d="M200 0 V1000"/><path d="M400 0 V1000"/><path d="M600 0 V1000"/>
    <path d="M800 0 V1000"/><path d="M1000 0 V1000"/><path d="M1200 0 V1000"/><path d="M1400 0 V1000"/>
  </g>

  <!-- Mobility arcs (Warsaw → Lisbon, Warsaw → Dubai, London → Basseterre, Milan → Singapore) -->
  <g>
    <path class="arc"          d="M 260 430 Q 520 120 940 420"/>
    <path class="arc"          d="M 260 430 Q 780 60  1380 540"/>
    <path class="arc--bright"  d="M 340 380 Q 720 140 1080 500" />
    <path class="arc"          d="M 500 410 Q 820 220 1260 600"/>
  </g>

  <!-- Destination markers -->
  <g>
    <g transform="translate(260,430)"><circle class="dest" r="4"/><circle class="dest-ring" r="10"/></g>
    <g transform="translate(940,420)"><circle class="dest" r="4"/><circle class="dest-ring" r="10"/></g>
    <g transform="translate(1380,540)"><circle class="dest" r="4"/><circle class="dest-ring" r="10"/></g>
    <g transform="translate(1080,500)"><circle class="dest" r="5"/><circle class="dest-ring" r="14"/></g>
    <g transform="translate(340,380)"><circle class="dest" r="3.5"/></g>
    <g transform="translate(500,410)"><circle class="dest" r="3.5"/></g>
    <g transform="translate(1260,600)"><circle class="dest" r="3.5"/></g>
  </g>

  <!-- Vignette over the whole thing -->
  <rect width="1600" height="1000" fill="url(#ap-vignette)"/>
</svg>
